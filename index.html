<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruby Codex — Caderno de Estudos de Ruby</title>
  <meta name="description" content="Um caderno de estudos e wiki de documentação para aprender Ruby do zero ao profissional. Baseado na documentação oficial." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 2L3 10v12l13 8 13-8V10L16 2z' fill='%23c8322a'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="icon-btn menu-btn" id="menuBtn" aria-label="Abrir menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <a class="brand" href="#/">
        <svg class="brand-gem" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 4h14l6 9-13 23L7 13l6-9Z" fill="url(#g)" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M7 13h26M13 4l3 9m8-9-3 9m0 0h-10m10 0 5 0m-15 0-5 0m5 0L20 36m0-23L20 36" stroke="currentColor" stroke-width="1" opacity=".5"/>
          <defs><linearGradient id="g" x1="7" y1="4" x2="33" y2="36" gradientUnits="userSpaceOnUse"><stop stop-color="#e0473b"/><stop offset="1" stop-color="#a5231c"/></linearGradient></defs>
        </svg>
        <span class="brand-name">Ruby<b>Codex</b></span>
      </a>
    </div>

    <button class="search-trigger" id="searchBtn" aria-label="Pesquisar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.9" y2="16.9"/></svg>
      <span>Pesquisar na documentação…</span>
      <kbd>Ctrl K</kbd>
    </button>

    <div class="topbar-right">
      <a class="icon-btn" href="#/favoritos" title="Favoritos" aria-label="Favoritos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </a>
      <a class="icon-btn" href="#/historico" title="Histórico" aria-label="Histórico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
      </a>
      <button class="icon-btn theme-btn" id="themeBtn" aria-label="Alternar tema">
        <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
        <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
      </button>
    </div>
  </header>

  <!-- ============ LAYOUT ============ -->
  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-scroll">
        <nav class="nav-tree" id="navTree" aria-label="Navegação principal"></nav>
      </div>
      <div class="sidebar-foot">
        <div class="progress-mini">
          <div class="progress-mini-top">
            <span>Progresso</span>
            <span id="progressPct">0%</span>
          </div>
          <div class="progress-mini-bar"><i id="progressBar"></i></div>
          <div class="progress-mini-sub"><span id="progressRead">0</span> páginas lidas · <span id="progressFav">0</span> favoritas</div>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content" id="content" tabindex="-1"></main>

    <!-- TABLE OF CONTENTS -->
    <aside class="toc" id="toc" aria-label="Nesta página"></aside>
  </div>

  <div class="scrim" id="scrim"></div>

  <!-- ============ SEARCH MODAL ============ -->
  <div class="search-modal" id="searchModal" aria-hidden="true">
    <div class="search-box" role="dialog" aria-modal="true" aria-label="Pesquisar">
      <div class="search-input-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.9" y2="16.9"/></svg>
        <input type="text" id="searchInput" placeholder="Pesquise conceitos, métodos, exemplos…" autocomplete="off" spellcheck="false" />
        <button class="search-esc" id="searchClose">Esc</button>
      </div>
      <div class="search-results" id="searchResults"></div>
      <div class="search-foot">
        <span><kbd>↑</kbd><kbd>↓</kbd> navegar</span>
        <span><kbd>↵</kbd> abrir</span>
        <span><kbd>esc</kbd> fechar</span>
      </div>
    </div>
  </div>

  <button class="to-top" id="toTop" aria-label="Voltar ao topo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="script.js"></script>
  <script src="docs-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
